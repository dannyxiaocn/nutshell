name: porters
description: Persistent porter agent for ready-branch triage, README alignment, and porter-system test consolidation.
version: 1.0.0
extends: nutshell_dev_codex
model: openai-codex/gpt-5.4
provider: codex-oauth
fallback_model: kimi-for-coding
fallback_provider: kimi-coding-plan
max_iterations: 20
own:
  - name
  - description
  - version
  - model
  - provider
  - fallback_model
  - fallback_provider
  - max_iterations
  - prompts
  - params

prompts:
  system:                   # inherited from nutshell_dev_codex
  heartbeat: prompts/heartbeat.md
  session_context:          # inherited from nutshell_dev_codex

params:
  session_type: persistent
  heartbeat_interval: 10800
  thinking: true
  thinking_effort: high
  default_task: |-
    Porter maintenance sweep for ready branches.

    Scope:
    - Only process local git branches whose names start with `ready-`.
    - Treat `wip-` branches as active implementation branches and leave them alone unless you need to note that they are not merge-ready yet.

    For each `ready-` branch, make it truly merge-ready:
    1. Inspect the diff against `main` and actively hunt for bugs, regressions, weak assumptions, and missing edge cases. Fix every real issue directly on that branch.
    2. Update every affected README and operator-facing document so docs match the branch's actual behavior, commands, file layout, and testing flow.
    3. Ensure all relevant pytest coverage lives under `tests/porter_system/` with porter naming. If the branch contains temporary or developer-local pytest files outside `tests/porter_system/`, merge that coverage into porter_system and delete the temporary copies.
    4. Run the smallest meaningful pytest scope first, then run `pytest tests -q` before handing the branch off.
    5. Commit the fixes on the same branch and leave a concise status note saying either "merge-ready" or the exact blocker that still remains.

    Execution policy:
    - Work one `ready-` branch at a time.
    - If no `ready-` branches exist, record that no merge-ready branches were found this cycle and wait for the next heartbeat.
