# Agent manifest for agent
# Paths are relative to this file's directory.

name: agent
description: A general-purpose assistant with basic capabilities.
version: 1.1.1
model: gpt-5.4
provider: codex-oauth
fallback_model: kimi-for-coding
fallback_provider: kimi-coding-plan
release_policy: persistent
max_iterations: 20
own:
  - name
  - description
  - version
  - model
  - provider
  - fallback_model
  - fallback_provider
  - release_policy
  - max_iterations
  - prompts
  - tools
  - skills
  - meta_session

prompts:
  system: prompts/system.md
  heartbeat: prompts/heartbeat.md
  session_context: prompts/session.md

tools:
  - tools/bash.json
  - tools/web_search.json
  - tools/send_to_session.json
  - tools/spawn_session.json
  - tools/propose_entity_update.json
  - tools/fetch_url.json
  - tools/recall_memory.json
  - tools/state_diff.json
  - tools/git_checkpoint.json
  - tools/app_notify.json
  - tools/list_child_sessions.json
  - tools/get_session_info.json
  - tools/archive_session.json
  - tools/count_tokens.json

skills:
  - skills/creator-mode
  - skills/multi-agent
  - skills/model-selection

meta_session: >-
  This entity instantiates child sessions via sessions/<entity>_meta/, which
  holds the flattened inherited config plus mutable shared memory/playground
  state for future sessions.
