name: nutshell_dev
description: Development assistant with nutshell project context. Extends kimi_agent (kimi-for-coding model) with nutshell skill added.
version: 1.0.0
extends: kimi_agent
max_iterations: 20
link:
  - model
  - provider
  - fallback_model
  - fallback_provider
append:
  - skills
own:
  - name
  - description
  - version
  - release_policy
  - max_iterations
  - prompts
  - meta_session
  - memory
  - playground

prompts:
  system:                        # inherited from kimi_agent → agent
  heartbeat: prompts/heartbeat.md  # autonomous track.md task selection
  session_context:               # inherited

tools:    # inherited from kimi_agent → agent

skills:
  - skills/nutshell
  - skills/creator-mode
  - skills/multi-agent
  - skills/model-selection

meta_session: >-
  This entity instantiates child sessions via sessions/<entity>_meta/, which
  holds the flattened inherited config plus mutable shared memory/playground
  state for future sessions.
