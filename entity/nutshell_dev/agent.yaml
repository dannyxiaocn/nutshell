name: nutshell_dev
description: Development assistant with nutshell project context.
version: 1.0.0
init_from: agent
model: gpt-5.4
provider: codex-oauth
fallback_model: kimi-for-coding
fallback_provider: kimi-coding-plan
max_iterations: 20

prompts:
  system: prompts/system.md
  heartbeat: prompts/heartbeat.md
  session_context: prompts/session.md

tools:
  - tools/bash.json
  - tools/skill.json
  - tools/web_search.json

skills:
  - skills/nutshell
  - skills/creator-mode

params:
  thinking: true

meta_session: >-
  This entity instantiates child sessions via sessions/<entity>_meta/, which
  holds the entity config plus mutable shared memory/playground state for
  future sessions.
