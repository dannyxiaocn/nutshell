# Agent manifest for agent_core
# Paths are relative to this file's directory.

name: agent_core
description: A general-purpose assistant with basic capabilities.
model: claude-sonnet-4-6
provider: anthropic
release_policy: persistent
max_iterations: 20

prompts:
  system: prompts/system.md
  heartbeat: prompts/heartbeat.md
  session_context: prompts/session_context.md

tools:
  - tools/bash.json

skills:
  - skills/reasoning.md
