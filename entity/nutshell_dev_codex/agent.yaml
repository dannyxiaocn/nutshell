name: nutshell_dev_codex
description: Development assistant with nutshell project context. Uses OpenAI Codex via ChatGPT OAuth. Extends nutshell_dev.
version: 1.0.2
model: openai-codex/gpt-5.4
provider: codex-oauth
extends: nutshell_dev
max_iterations: 20

meta_session: >-
  This entity instantiates child sessions via sessions/<entity>_meta/, which
  holds the flattened inherited config plus mutable shared memory/playground
  state for future sessions.
