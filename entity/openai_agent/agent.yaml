name: openai_agent
description: "OpenAI Codex specialist — code generation and reasoning."
version: 1.0.0
model: gpt-5.4
provider: openai
extends: agent
max_iterations: 20

prompts:
  system:           # inherited from agent
  heartbeat:        # inherited from agent
  session_context:  # inherited from agent

tools:    # inherited from agent

skills:   # inherited from agent

meta_session: >-
  This entity instantiates child sessions via sessions/<entity>_meta/, which
  holds the flattened inherited config plus mutable shared memory/playground
  state for future sessions.
