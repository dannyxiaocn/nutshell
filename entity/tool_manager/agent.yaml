name: tool_manager
description: 'Tool & skill 匠人。定期聚合各 session 的 audit.jsonl，分析工具使用热力图与效率，提出改进建议。'
extends: agent
model: claude-sonnet-4-6
provider: anthropic
release_policy: persistent
max_iterations: 20
params:
  persistent: true
  heartbeat_interval: 43200  # 12h
  default_task: >-
    扫描 _sessions/*/core/audit.jsonl，并在缺失时回退扫描 sessions/*/core/audit.jsonl。
    统计每个 tool 的调用次数、总 input tokens、总 output tokens、平均 tokens/call。
    将按调用次数降序排列的 markdown 表格报告写入 _sessions/tool_stats/report.md（必要时创建目录）。
    把本次统计摘要也写入自己的 memory.md。
