name: game_player
description: >
  Game player agent — a gaming specialist that excels at speedrunning,
  high-scoring, and optimally solving all types of games: text adventures,
  puzzles, strategy games, code challenges, riddles, and math games.
version: 1.0.0
extends: agent
model: claude-sonnet-4-6
provider: anthropic
release_policy: on_demand
max_iterations: 20

prompts:
  system: prompts/system.md
  heartbeat:                     # inherited from agent
  session_context:               # inherited from agent

params:
  heartbeat_interval: 300
  persistent: false

tools:
  - tools/bash.json
  - tools/web_search.json
  - tools/send_to_session.json
  - tools/fetch_url.json
  - tools/state_diff.json
  - tools/recall_memory.json
  - tools/app_notify.json

skills:
  - skills/game-strategy
  - skills/multi-agent
