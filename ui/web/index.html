<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutshell</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
    --border: #30363d; --accent: #58a6ff; --green: #3fb950;
    --yellow: #d29922; --red: #f85149; --text: #c9d1d9; --muted: #8b949e;
    --dimmed: #6e7681;
    --ui-font: "SF Mono", "Fira Code", ui-monospace, Menlo, monospace;
    --scroll-track: #11161d;
    --scroll-thumb: #2d3742;
    --scroll-thumb-hover: #3b4754;
  }

  body { background: var(--bg); color: var(--text); font-family: var(--ui-font); font-size: 13px; height: 100vh; display: flex; flex-direction: column; }
  * { scrollbar-width: thin; scrollbar-color: var(--scroll-thumb) var(--scroll-track); }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-track { background: var(--scroll-track); }
  *::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 999px; border: 2px solid var(--scroll-track); }
  *::-webkit-scrollbar-thumb:hover { background: var(--scroll-thumb-hover); }
  *::-webkit-scrollbar-corner { background: var(--scroll-track); }

  /* Header */
  #header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 12px; }
  #header h1 { font-size: 15px; font-weight: 600; color: var(--accent); }
  #server-indicator { display: flex; align-items: center; gap: 8px; padding: 4px 10px; border: 1px solid var(--border); border-radius: 999px; font-size: 11px; color: var(--muted); }
  #server-indicator.on { border-color: rgba(63, 185, 80, 0.45); color: #b8f3c0; background: rgba(63, 185, 80, 0.12); }
  #server-indicator.off { border-color: rgba(248, 81, 73, 0.45); color: #ffb7b1; background: rgba(248, 81, 73, 0.12); }
  #server-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  #server-indicator.on #server-dot { background: var(--green); }
  #server-indicator.off #server-dot { background: var(--red); }
  #weixin-indicator { display: flex; align-items: center; gap: 8px; padding: 4px 10px; border: 1px solid var(--border); border-radius: 999px; font-size: 11px; color: var(--muted); cursor: default; }
  #weixin-indicator.running { border-color: rgba(63, 185, 80, 0.45); color: #b8f3c0; background: rgba(63, 185, 80, 0.12); }
  #weixin-indicator.error, #weixin-indicator.no_account { border-color: rgba(248, 81, 73, 0.45); color: #ffb7b1; background: rgba(248, 81, 73, 0.12); }
  #weixin-indicator.stopped { border-color: rgba(210, 153, 34, 0.45); color: #f4d48c; background: rgba(210, 153, 34, 0.12); }
  #weixin-glyph { font-size: 12px; line-height: 1; opacity: 0.9; }
  #header-meta { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  #session-name { font-size: 11px; color: var(--muted); }
  #session-indicator { display: flex; align-items: center; gap: 8px; padding: 4px 10px; border: 1px solid var(--border); border-radius: 999px; font-size: 11px; color: var(--muted); }
  #session-indicator.running { border-color: rgba(63, 185, 80, 0.45); color: #b8f3c0; background: rgba(63, 185, 80, 0.12); }
  #session-indicator.napping { border-color: rgba(210, 153, 34, 0.45); color: #f4d48c; background: rgba(210, 153, 34, 0.12); }
  #session-indicator.stopped { border-color: rgba(248, 81, 73, 0.45); color: #ffb7b1; background: rgba(248, 81, 73, 0.12); }
  #session-indicator.idle { border-color: var(--border); color: var(--muted); background: transparent; }
  #session-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  #session-indicator.running #session-dot { background: var(--green); animation: pulse-dot 1.5s ease-in-out infinite; }
  #session-indicator.napping #session-dot { background: var(--yellow); animation: pulse-dot 2.5s ease-in-out infinite; }
  #session-indicator.stopped #session-dot { background: var(--red); }
  #session-indicator.idle #session-dot { background: var(--muted); }

  @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Layout */
  #main { display: flex; flex: 1; overflow: hidden; }
  #sidebar { width: 220px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  #chat-area { flex: 1; display: flex; flex-direction: column; }
  #tasks-panel { width: 240px; background: var(--bg2); border-left: 1px solid var(--border); display: flex; flex-direction: column; }

  /* Sidebar */
  .panel-header { padding: 10px 12px; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-family: var(--ui-font); }
  #session-list { flex: 1; overflow-y: auto; }
  .session-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .session-item:hover { background: var(--bg3); }
  .session-item.active { background: var(--bg3); border-left: 2px solid var(--accent); }
  .session-name { font-weight: 500; color: var(--text); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .session-meta { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .dot.running { background: var(--green); animation: pulse-dot 1.5s ease-in-out infinite; }
  .dot.napping { background: var(--yellow); animation: pulse-dot 2.5s ease-in-out infinite; }
  .dot.persistent { background: #7df09a; }
  .dot.persistent { background: #7df09a; }
  .dot.stopped { background: var(--red); }
  .dot.meta { background: #a371f7; }
  .dot.idle { background: var(--muted); }
  #new-btn { margin: 10px 10px 0; padding: 6px 10px; background: var(--accent); color: #000; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
  #new-btn:hover { opacity: 0.85; }
  .session-controls { display: flex; gap: 4px; margin: 4px 10px 10px; }
  .ctrl-btn { flex: 1; padding: 4px 0; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 11px; background: var(--bg3); color: var(--muted); }
  .ctrl-btn:hover { color: var(--text); border-color: var(--muted); }
  .ctrl-btn.stop:hover { color: var(--red); border-color: var(--red); }
  .ctrl-btn.start:hover { color: var(--green); border-color: var(--green); }

  /* Chat */
  #messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .msg { padding: 6px 10px; border-radius: 6px; max-width: 90%; line-height: 1.6; word-break: break-word; }
  .msg.agent { background: var(--bg3); border-left: 3px solid var(--accent); color: var(--text); }
  .msg.agent.heartbeat-agent { border-left-color: #6b9fd4; opacity: 0.85; }
  .msg.user  { background: #1c2a3a; border-left: 3px solid var(--green); color: var(--text); align-self: flex-end; }
  .msg.tool  { background: var(--bg2); color: var(--fg); font-size: 11px; border-left: 3px solid var(--yellow); padding: 8px 10px; }
  .tool-card { display: flex; flex-direction: column; gap: 6px; }
  .tool-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .tool-main { display: flex; align-items: center; gap: 6px; min-width: 0; flex-wrap: wrap; }
  .tool-name { display: inline-flex; align-items: center; padding: 2px 6px; border-radius: 999px; background: rgba(241, 196, 15, 0.14); color: var(--yellow); font-weight: 600; letter-spacing: .02em; }
  .tool-meta { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .tool-badge { display: inline-flex; align-items: center; padding: 1px 6px; border-radius: 999px; background: var(--bg); color: var(--muted); font-size: 10px; }
  .tool-summary { color: var(--fg); min-width: 0; }
  .quote { color: var(--yellow); }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .tool-command { margin: 0; background: rgba(0,0,0,.18); border-radius: 4px; padding: 6px 8px; overflow-x: auto; }
  .tool-command code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--fg); white-space: pre-wrap; word-break: break-word; display: block; }
  .tool-more { align-self: flex-start; cursor: pointer; color: var(--muted); font-size: 10px; border: 0; background: none; padding: 0; }
  .msg.heartbeat_trigger { background: #1a2030; border-left: 3px solid var(--accent); color: var(--text); align-self: flex-end; }
  .msg.heartbeat_finished { color: var(--muted); font-size: 11px; }
  .msg.status { color: var(--muted); font-size: 11px; text-align: center; align-self: center; }
  .msg.error  { background: #2d1515; border-left: 3px solid var(--red); color: var(--red); }
  .msg-label  { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
  .msg-ts { font-size: 10px; color: var(--muted); opacity: 0.5; margin-top: 4px; }
  .msg-footer { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  .msg-usage { font-size: 10px; color: var(--muted); opacity: 0.6; font-family: 'SF Mono', monospace; }
  .msg-inline { display: inline-flex; align-items: center; gap: 8px; }
  .msg-inline-ts { font-size: 10px; color: var(--muted); opacity: 0.75; }

  /* Thinking bubble */
  .msg.thinking { background: var(--bg3); border-left: 3px solid var(--accent); color: var(--muted); }
  .thinking-dots { display: inline-flex; gap: 4px; align-items: center; height: 20px; }
  .thinking-dots span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; display: inline-block; animation: thinking-bounce 1.2s ease-in-out infinite; }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes thinking-bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-5px); opacity: 1; } }

  /* Markdown rendering inside agent messages */
  .msg.agent p { margin: 0.4em 0; }
  .msg.agent p:first-child { margin-top: 0; }
  .msg.agent p:last-child { margin-bottom: 0; }
  .msg.agent code { background: var(--bg); padding: 1px 5px; border-radius: 3px; font-family: inherit; font-size: 12px; }
  .msg.agent pre { background: var(--bg); padding: 8px 10px; border-radius: 4px; overflow-x: auto; margin: 6px 0; }
  .msg.agent pre code { padding: 0; background: none; }
  .msg.agent ul, .msg.agent ol { margin: 0.4em 0 0.4em 1.4em; }
  .msg.agent li { margin: 0.2em 0; }
  .msg.agent h1, .msg.agent h2, .msg.agent h3, .msg.agent h4 { margin: 0.6em 0 0.3em; font-weight: 600; }
  .msg.agent blockquote { border-left: 3px solid var(--border); padding-left: 8px; color: var(--muted); margin: 0.4em 0; }
  .msg.agent table { border-collapse: collapse; width: 100%; margin: 0.4em 0; }
  .msg.agent th, .msg.agent td { border: 1px solid var(--border); padding: 4px 8px; }
  .msg.agent th { background: var(--bg2); }
  .msg.agent a { color: var(--accent); }
  .msg.user p { margin: 0.4em 0; }
  .msg.user p:first-child { margin-top: 0; }
  .msg.user p:last-child { margin-bottom: 0; }
  .msg.user code { background: rgba(0, 0, 0, 0.18); padding: 1px 5px; border-radius: 3px; font-family: inherit; font-size: 12px; }
  .msg.user pre { background: rgba(0, 0, 0, 0.18); padding: 8px 10px; border-radius: 4px; overflow-x: auto; margin: 6px 0; }
  .msg.user pre code { padding: 0; background: none; }
  .msg.user ul, .msg.user ol { margin: 0.4em 0 0.4em 1.4em; }
  .msg.user li { margin: 0.2em 0; }
  .msg.user a { color: #9ed0ff; }

  /* Input */
  #input-row { padding: 10px 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; background: var(--bg2); }
  #msg-input { flex: 1; background: var(--bg3); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-family: inherit; font-size: 13px; outline: none; }
  #msg-input:focus { border-color: var(--accent); }
  #send-btn { padding: 8px 14px; background: var(--accent); color: #000; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; }
  #send-btn:hover { opacity: 0.85; }

  /* Tasks */
  #tasks-panel { width: 320px; background: var(--bg2); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
  #panel-tabs { display: flex; gap: 6px; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .panel-tab { padding: 5px 8px; border-radius: 999px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 11px; cursor: pointer; font-family: var(--ui-font); letter-spacing: 0.01em; }
  .panel-tab.active { color: var(--text); background: var(--bg3); border-color: var(--accent); }
  .panel-page { display: none; flex: 1; min-height: 0; }
  .panel-page.active { display: flex; flex-direction: column; }
  .panel-view { flex: 1; padding: 14px 16px; overflow-y: auto; white-space: pre-wrap; font-size: 13px; color: var(--text); line-height: 1.7; font-family: var(--ui-font); }
  .panel-edit { display: none; flex-direction: column; flex: 1; padding: 8px; gap: 6px; }
  .panel-textarea { flex: 1; background: var(--bg3); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-family: var(--ui-font); font-size: 12px; resize: none; outline: none; line-height: 1.65; }
  .panel-actions { display: flex; gap: 6px; }
  .panel-actions button { padding: 4px 10px; background: var(--bg3); color: var(--muted); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 12px; }
  .panel-actions button:hover { color: var(--text); border-color: var(--muted); }
  .panel-actions button:first-child { background: var(--green); color: #000; border-color: rgba(63, 185, 80, 0.5); }
  #tasks-save { padding: 4px 10px; background: var(--green); color: #000; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
  #tasks-cancel { padding: 4px 10px; background: var(--bg3); color: var(--muted); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 12px; }
  #tasks-edit-btn { cursor: pointer; font-size: 11px; color: var(--muted); border: none; background: none; }
  #tasks-edit-btn:hover { color: var(--accent); }
  #tasks-footer { padding: 5px 12px; border-top: 1px solid var(--border); text-align: right; font-size: 10px; color: var(--muted); }
  .config-grid { display: grid; grid-template-columns: max-content 1fr; gap: 8px 10px; white-space: normal; }
  .config-key { color: var(--muted); font-family: var(--ui-font); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; padding-top: 2px; }
  .config-value { word-break: break-word; }
  .config-empty { color: var(--muted); font-style: italic; }
  .danger-btn { color: #ffb7b1; border-color: rgba(248, 81, 73, 0.45); }
  .danger-btn:hover { color: var(--red); border-color: var(--red); }
</style>
</head>
<body>

<div id="header">
  <h1>🥜 nutshell</h1>
  <div id="server-indicator" class="off">
    <span id="server-dot"></span>
    <span id="server-state">server off</span>
  </div>
  <div id="weixin-indicator" class="idle" title="WeChat bridge status">
    <span id="weixin-glyph">〰</span>
    <span id="weixin-state">微信</span>
  </div>
  <div id="header-meta">
    <span id="session-name">no session selected</span>
    <div id="session-indicator" class="idle">
      <span id="session-dot"></span>
      <span id="session-state">idle</span>
    </div>
  </div>
</div>

<div id="main">
  <!-- Sidebar: sessions -->
  <div id="sidebar">
    <div class="panel-header">
      Sessions
      <button id="new-btn" onclick="showNewSessionDialog()">+ New</button>
    </div>
    <div id="session-list"></div>
    <div class="session-controls">
      <button class="ctrl-btn stop" onclick="stopSession()">⏸ Stop</button>
      <button class="ctrl-btn start" onclick="startSession()">▶ Start</button>
      <button class="ctrl-btn danger-btn" onclick="deleteSession()">✕ Delete</button>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat-area">
    <div id="messages">
      <div class="msg status">Select or create a session to start chatting.</div>
    </div>
    <div id="input-row">
      <input id="msg-input" type="text" placeholder="Type a message..." disabled onkeydown="onInputKey(event)">
      <button id="send-btn" onclick="sendMessage()" disabled>Send</button>
    </div>
  </div>

  <!-- Tasks -->
  <div id="tasks-panel">
    <div class="panel-header">
      Session Panel
      <button id="tasks-edit-btn" onclick="toggleTasksEdit()">edit</button>
    </div>
    <div id="panel-tabs">
      <button class="panel-tab active" data-page="task" onclick="setPanelPage('task')">task.md</button>
      <button class="panel-tab" data-page="default" onclick="setPanelPage('default')">default task</button>
      <button class="panel-tab" data-page="config" onclick="setPanelPage('config')">config</button>
    </div>
    <div id="panel-page-task" class="panel-page active">
      <div id="tasks-content" class="panel-view">(no session selected)</div>
      <div id="tasks-edit" class="panel-edit">
        <textarea id="tasks-textarea" class="panel-textarea" placeholder="Add tasks here..."></textarea>
        <div class="panel-actions">
          <button id="tasks-save" onclick="saveTasks()">Save</button>
          <button id="tasks-cancel" onclick="toggleTasksEdit()">Cancel</button>
        </div>
      </div>
    </div>
    <div id="panel-page-default" class="panel-page">
      <div id="default-task-content" class="panel-view">(no session selected)</div>
      <div id="default-task-edit" class="panel-edit">
        <textarea id="default-task-textarea" class="panel-textarea" placeholder="Default task for persistent heartbeat..."></textarea>
        <div class="panel-actions">
          <button id="default-task-save" onclick="saveDefaultTask()">Save</button>
          <button onclick="toggleTasksEdit()">Cancel</button>
        </div>
      </div>
    </div>
    <div id="panel-page-config" class="panel-page">
      <div id="config-content" class="panel-view">(no session selected)</div>
      <div id="config-edit" class="panel-edit">
        <textarea id="config-textarea" class="panel-textarea" placeholder='{"heartbeat_interval":600}'></textarea>
        <div class="panel-actions">
          <button onclick="saveConfig()">Save</button>
          <button onclick="toggleTasksEdit()">Cancel</button>
        </div>
      </div>
    </div>
    <div id="tasks-footer"></div>
  </div>
</div>

<script>
  let currentSession = null;
  let eventSource = null;
  let sessions = [];
  let modelState = { state: 'idle', source: null };
  let thinkingEl = null;
  let panelPage = 'task';
  let weixinStatus = { status: 'idle', session: null };

  if (typeof marked !== 'undefined') {
    marked.setOptions({ breaks: true, gfm: true });
  }

  async function init() {
    await refreshSessions();
    setInterval(refreshSessions, 3000);
    setInterval(refreshPanelData, 2000);
    refreshWeixinStatus();
    setInterval(refreshWeixinStatus, 5000);
  }

  async function refreshWeixinStatus() {
    try {
      const res = await fetch('/api/weixin/status');
      const data = await res.json();
      weixinStatus = data;
      const el = document.getElementById('weixin-indicator');
      const stateEl = document.getElementById('weixin-state');
      const glyphEl = document.getElementById('weixin-glyph');
      el.className = data.status;
      const labels = { running: '微信 bridge', no_account: '微信 unavailable', error: '微信 error', idle: '微信 idle', stopped: '微信 paused' };
      const glyphs = { running: '⇄', no_account: '×', error: '!', idle: '≈', stopped: '∥' };
      const sessionHint = data.session ? ` · ${data.session}` : '';
      stateEl.textContent = (labels[data.status] || '微信') + sessionHint;
      glyphEl.textContent = glyphs[data.status] || '≈';
      el.title = data.error ? `WeChat: ${data.error}` : `WeChat bridge: ${data.status}${sessionHint}`;
      renderSessionList();
    } catch (e) {}
  }

  async function refreshSessions() {
    try {
      const res = await fetch('/api/sessions');
      sessions = await res.json();
    } catch (e) { return; }
    syncModelStateFromMeta();
    renderServerIndicator();
    renderSessionList();
    renderSessionIndicator();
  }

  function renderServerIndicator() {
    const hasRunningDaemon = sessions.some(sess => sess.pid_alive);
    const el = document.getElementById('server-indicator');
    const state = document.getElementById('server-state');
    el.className = hasRunningDaemon ? 'on' : 'off';
    state.textContent = hasRunningDaemon ? 'server on' : 'server off';
  }

  function renderSessionList() {
    const list = document.getElementById('session-list');
    list.innerHTML = '';
    for (const sess of sessions) {
      const tone = isMetaSession(sess) ? 'meta' : (sess.persistent ? 'persistent' : sessionTone(sess));
      const div = document.createElement('div');
      const linked = weixinStatus?.session === sess.id ? '🔗 ' : '';
      div.className = 'session-item' + (sess.id === currentSession ? ' active' : '');
      div.onclick = () => attachSession(sess.id);
      const lastRun = sess.last_run_at ? fmtDate(sess.last_run_at) : (sess.created_at ? fmtDate(sess.created_at) : '');
      div.innerHTML = `
        <div class="session-name">
          <span class="dot ${tone}"></span>${linked}${escHtml(sess.id)}
        </div>
        <div class="session-meta">${escHtml(sess.entity)}${lastRun ? ' · ' + lastRun : ''}</div>
      `;
      list.appendChild(div);
    }
  }

  async function attachSession(id) {
    if (id === currentSession) return;
    currentSession = id;
    renderSessionList();

    if (eventSource) { eventSource.close(); eventSource = null; }
    hideThinking();

    const msgs = document.getElementById('messages');
    msgs.innerHTML = '';
    modelState = { state: 'idle', source: null };
    renderServerIndicator();
    renderSessionIndicator();

    updateChatAvailability();

    const histRes = await fetch(`/api/sessions/${id}/history`);
    const { events, context_offset, events_offset } = await histRes.json();
    for (const event of events) appendEvent(event);
    syncModelStateFromMeta();
    renderSessionIndicator();
    if (modelState.state === 'running') showThinking();

    eventSource = new EventSource(`/api/sessions/${id}/events?context_since=${context_offset}&events_since=${events_offset}`);
    const types = ['agent', 'user', 'tool', 'model_status', 'partial_text', 'heartbeat_trigger', 'heartbeat_finished', 'status', 'error'];
    for (const t of types) {
      eventSource.addEventListener(t, e => appendEvent(JSON.parse(e.data)));
    }

    await refreshPanelData();
  }

  async function showNewSessionDialog() {
    const id = prompt('Session ID (leave empty for timestamp):') ?? null;
    if (id === null) return;
    const entity = prompt('Entity path:', 'entity/agent');
    if (!entity) return;
    const res = await fetch('/api/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: id || '', entity }),
    });
    const data = await res.json();
    await refreshSessions();
    attachSession(data.id);
  }

  function thinkingHtml(text) {
    if (text) {
      return '<div class="msg-label">agent</div><div class="thinking-text">' + renderMarkdown(text) + '</div>';
    }
    return '<div class="msg-label">agent</div><div class="thinking-dots"><span></span><span></span><span></span></div>';
  }

  function ensureThinkingLast() {
    const msgs = document.getElementById('messages');
    if (thinkingEl && thinkingEl.parentElement === msgs && msgs.lastElementChild !== thinkingEl) {
      msgs.appendChild(thinkingEl);
    }
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showThinking(text) {
    const msgs = document.getElementById('messages');
    if (!thinkingEl) {
      thinkingEl = document.createElement('div');
      thinkingEl.className = 'msg thinking';
      thinkingEl.id = 'thinking-bubble';
      msgs.appendChild(thinkingEl);
    }
    thinkingEl.innerHTML = thinkingHtml(text);
    ensureThinkingLast();
  }

  function hideThinking() {
    if (thinkingEl) {
      thinkingEl.remove();
      thinkingEl = null;
    }
  }

  function fmtTime(ts) {
    if (!ts) return '';
    try {
      const d = new Date(ts);
      return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    } catch { return ''; }
  }

  function fmtDate(ts) {
    if (!ts) return '';
    try {
      const d = new Date(ts);
      const now = new Date();
      const isToday = d.toDateString() === now.toDateString();
      if (isToday) return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    } catch { return ''; }
  }

  function renderMarkdown(text) {
    if (typeof marked !== 'undefined') {
      return marked.parse(text || '');
    }
    return '<pre style="white-space:pre-wrap">' + escHtml(text || '') + '</pre>';
  }

  function appendMessageNode(div) {
    const msgs = document.getElementById('messages');
    if (thinkingEl && msgs.contains(thinkingEl)) {
      msgs.insertBefore(div, thinkingEl);
      ensureThinkingLast();
    } else {
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }
  }

  function appendEvent(event) {
    const etype = event.type || 'message';

    if (etype === 'model_status') {
      modelState = { state: event.state || 'idle', source: event.source || null };
      const meta = currentSessionMeta();
      if (meta) {
        meta.model_state = modelState.state;
        meta.model_source = modelState.source;
      }
      if (modelState.state === 'running') {
        showThinking();
      } else {
        hideThinking();
      }
      renderSessionIndicator();
      renderSessionList();
      return;
    }

    if (etype === 'partial_text') {
      showThinking(event.content || '');
      return;
    }

    const div = document.createElement('div');
    div.className = `msg ${etype}`;

    let label = '';
    let html = '';

    if (etype === 'agent') {
      hideThinking();
      label = event.triggered_by === 'heartbeat' || event.triggered_by === 'heartbeat_default' ? '⏱ agent' : 'agent';
      div.className += event.triggered_by === 'heartbeat' || event.triggered_by === 'heartbeat_default' ? ' heartbeat-agent' : '';
      html = renderMarkdown(event.content || '');
    } else if (etype === 'user') {
      label = 'you';
      html = renderMarkdown(event.content || '');
    } else if (etype === 'tool') {
      html = renderToolCall(event.name, event.input || {});
    } else if (etype === 'heartbeat_trigger') {
      label = '⏱ server';
      html = '<em>heartbeat — checking tasks</em>';
    } else if (etype === 'heartbeat_finished') {
      hideThinking();
      html = '[session finished — all tasks done]';
    } else if (etype === 'status') {
      html = event.value === 'cancelled' || event.value === 'stopped' ? '[server stopped]' : `[status: ${escHtml(String(event.value || ''))}]`;
    } else if (etype === 'error') {
      hideThinking();
      html = `[error] ${escHtml(event.content || '')}`;
    } else {
      html = escHtml(JSON.stringify(event));
    }

    const ts = fmtTime(event.ts);
    const tsHtml = ts ? `<div class="msg-ts">${ts}</div>` : '';

    let footerHtml = '';
    if (etype === 'agent' && event.usage) {
      const u = event.usage;
      const parts = [];
      if (u.input || u.output) parts.push(`↑${u.input || 0} ↓${u.output || 0}`);
      if (u.cache_read) parts.push(`📦${u.cache_read}`);
      if (u.cache_write) parts.push(`✏️${u.cache_write}`);
      if (parts.length) footerHtml = `<span class="msg-usage">${parts.join(' · ')}</span>`;
    }
    const combinedFooter = (ts || footerHtml) ? `<div class="msg-footer">${ts ? `<span class="msg-ts" style="margin-top:0">${ts}</span>` : ''}${footerHtml}</div>` : '';

    if (etype === 'status') {
      const prefix = ts ? `<span class="msg-inline-ts">${ts}</span> ` : '';
      div.innerHTML = `<div class="msg-inline">${prefix}${html}</div>`;
    } else if (etype === 'agent' || etype === 'user') {
      div.innerHTML = `<div class="msg-label">${label}</div>${html}${etype === 'agent' ? combinedFooter : tsHtml}`;
    } else if (label) {
      div.innerHTML = `<div class="msg-label">${label}</div>${html}${tsHtml}`;
    } else {
      div.innerHTML = `${html}${tsHtml}`;
    }

    appendMessageNode(div);
  }

  function currentSessionMeta() {
    return sessions.find(sess => sess.id === currentSession) || null;
  }

  function isMetaSession(session) {
    return Boolean(session?.params?.is_meta_session || session?.id?.endsWith('_meta'));
  }

  function updateChatAvailability() {
    const input = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const meta = currentSessionMeta();
    const blocked = !meta || isMetaSession(meta);
    input.disabled = blocked;
    sendBtn.disabled = blocked;
    input.placeholder = blocked
      ? (meta ? 'Direct chat with meta sessions is disabled.' : 'Type a message...')
      : 'Type a message...';
  }

  function syncModelStateFromMeta() {
    const meta = currentSessionMeta();
    modelState = {
      state: meta?.model_state || 'idle',
      source: meta?.model_source || null,
    };
  }

  function isStoppedOld(session) {
    if (!session || session.status !== 'stopped') return false;
    const ts = session.stopped_at || session.updated_at;
    if (!ts) return false;
    const stoppedAt = new Date(ts);
    return Number.isFinite(stoppedAt.valueOf()) && (Date.now() - stoppedAt.getTime()) >= 12 * 3600 * 1000;
  }

  function sessionTone(session) {
    if (!session) return 'idle';
    if (session.pid_alive && session.model_state === 'running' && session.status !== 'stopped') return 'running';
    if (session.has_tasks && session.pid_alive && session.status !== 'stopped') return 'napping';
    if (session.persistent) return 'persistent';
    if (session.status === 'stopped') return isStoppedOld(session) ? 'idle' : 'stopped';
    return 'idle';
  }

  function renderSessionIndicator() {
    const meta = currentSessionMeta();
    const nameEl = document.getElementById('session-name');
    const indicator = document.getElementById('session-indicator');
    const stateEl = document.getElementById('session-state');
    if (!meta) {
      nameEl.textContent = 'no session selected';
      indicator.className = 'idle';
      stateEl.textContent = 'idle';
      return;
    }

    nameEl.textContent = meta.id;

    let tone = 'idle';
    let label = 'idle';
    if (meta.pid_alive && (meta.model_state === 'running' || modelState.state === 'running') && meta.status !== 'stopped') {
      tone = 'running';
      label = `running (${modelState.source || meta.model_source || 'user'})`;
    } else if (meta.has_tasks && meta.pid_alive && meta.status !== 'stopped') {
      tone = 'napping';
      label = 'napping';
    } else if (meta.status === 'stopped') {
      tone = isStoppedOld(meta) ? 'idle' : 'stopped';
      label = 'stopped';
    }

    indicator.className = tone;
    stateEl.textContent = label;
    updateChatAvailability();
  }

  function onInputKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !currentSession) return;
    if (isMetaSession(currentSessionMeta())) return;
    input.value = '';

    const meta = currentSessionMeta();
    if (meta && meta.status === 'stopped') {
      meta.status = 'active';
      meta.model_state = 'running';
      modelState = { state: 'running', source: 'user' };
      renderSessionIndicator();
      renderSessionList();
      showThinking();
    }

    await fetch(`/api/sessions/${currentSession}/messages`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: text }),
    });
  }

  function setPanelPage(page) {
    panelPage = page;
    document.querySelectorAll('.panel-tab').forEach(el => {
      el.classList.toggle('active', el.dataset.page === page);
    });
    document.querySelectorAll('.panel-page').forEach(el => {
      el.classList.toggle('active', el.id === `panel-page-${page}`);
    });
    updateEditButton();
  }

  function updateEditButton() {
    const btn = document.getElementById('tasks-edit-btn');
    btn.textContent = panelPage === 'config' ? 'edit json' : 'edit';
  }

  function toggleTasksEdit(force) {
    const pageMap = {
      task: ['tasks-content', 'tasks-edit', 'block'],
      default: ['default-task-content', 'default-task-edit', 'block'],
      config: ['config-content', 'config-edit', 'block'],
    };
    const [viewId, editId, viewDisplay] = pageMap[panelPage];
    const view = document.getElementById(viewId);
    const edit = document.getElementById(editId);
    const shouldEdit = typeof force === 'boolean' ? force : edit.style.display !== 'flex';
    view.style.display = shouldEdit ? 'none' : viewDisplay;
    edit.style.display = shouldEdit ? 'flex' : 'none';
  }

  async function refreshPanelData() {
    if (!currentSession) {
      document.getElementById('tasks-content').textContent = '(no session selected)';
      document.getElementById('default-task-content').textContent = '(no session selected)';
      document.getElementById('config-content').textContent = '(no session selected)';
      document.getElementById('tasks-textarea').value = '';
      document.getElementById('default-task-textarea').value = '';
      document.getElementById('config-textarea').value = '';
      toggleTasksEdit(false);
      document.getElementById('tasks-footer').textContent = '';
      updateChatAvailability();
      return;
    }
    try {
      const [tasksRes, sessionRes] = await Promise.all([
        fetch(`/api/sessions/${currentSession}/tasks`),
        fetch(`/api/sessions/${currentSession}`),
      ]);
      const taskData = await tasksRes.json();
      const sessionData = await sessionRes.json();
      mergeSessionMeta(sessionData);
      renderTaskPage(taskData.content || '');
      renderDefaultTaskPage(sessionData.default_task || '');
      renderConfigPage(sessionData.params || {});
      renderFooter(sessionData);
      renderServerIndicator();
      renderSessionIndicator();
      renderSessionList();
      updateChatAvailability();
    } catch (e) {}
  }

  function mergeSessionMeta(data) {
    const idx = sessions.findIndex(sess => sess.id === data.id);
    if (idx >= 0) sessions[idx] = { ...sessions[idx], ...data };
    else sessions.push(data);
  }

  function renderTaskPage(content) {
    document.getElementById('tasks-content').textContent = content.trim() || '(empty)';
    document.getElementById('tasks-textarea').value = content;
    const meta = currentSessionMeta();
    if (meta) meta.has_tasks = Boolean(content.trim());
  }

  function renderDefaultTaskPage(content) {
    document.getElementById('default-task-content').textContent = content.trim() || '(empty)';
    document.getElementById('default-task-textarea').value = content;
  }

  function renderConfigPage(params) {
    document.getElementById('config-textarea').value = JSON.stringify(params, null, 2);
    const entries = Object.entries(params || {});
    const view = document.getElementById('config-content');
    if (!entries.length) {
      view.innerHTML = '<div class="config-empty">(empty)</div>';
      return;
    }
    view.innerHTML = '<div class="config-grid">' + entries.map(([key, value]) =>
      `<div class="config-key">${escHtml(key)}</div><div class="config-value">${escHtml(typeof value === 'string' ? value : JSON.stringify(value))}</div>`
    ).join('') + '</div>';
  }

  function renderFooter(meta) {
    const footer = document.getElementById('tasks-footer');
    const updatedAt = meta?.tasks_updated_at;
    const interval = meta?.heartbeat_interval ?? meta?.params?.heartbeat_interval;
    const intervalStr = interval ? (interval >= 60 ? `every ${Math.round(interval / 60)}m` : `every ${interval}s`) : '';
    const updatedStr = updatedAt ? `task updated ${fmtDate(updatedAt)}` : '';
    footer.textContent = [updatedStr, intervalStr].filter(Boolean).join(' · ');
  }

  async function saveTasks() {
    if (!currentSession) return;
    const content = document.getElementById('tasks-textarea').value;
    await fetch(`/api/sessions/${currentSession}/tasks`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content }),
    });
    toggleTasksEdit(false);
    refreshPanelData();
  }

  async function saveDefaultTask() {
    if (!currentSession) return;
    const params = currentSessionMeta()?.params || {};
    params.default_task = document.getElementById('default-task-textarea').value;
    await fetch(`/api/sessions/${currentSession}/config`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ params }),
    });
    toggleTasksEdit(false);
    refreshPanelData();
    refreshSessions();
  }

  async function saveConfig() {
    if (!currentSession) return;
    let params;
    try {
      params = JSON.parse(document.getElementById('config-textarea').value || '{}');
    } catch (e) {
      alert('Config must be valid JSON.');
      return;
    }
    await fetch(`/api/sessions/${currentSession}/config`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ params }),
    });
    toggleTasksEdit(false);
    refreshPanelData();
    refreshSessions();
  }

  async function stopSession() {
    if (!currentSession) return;
    await fetch(`/api/sessions/${currentSession}/stop`, { method: 'POST' });
    await refreshSessions();
    await refreshPanelData();
  }

  async function startSession() {
    if (!currentSession) return;
    await fetch(`/api/sessions/${currentSession}/start`, { method: 'POST' });
    await refreshSessions();
    await refreshPanelData();
  }

  async function deleteSession() {
    if (!currentSession) return;
    if (!confirm(`Delete session ${currentSession}?`)) return;
    const deleting = currentSession;
    if (eventSource) { eventSource.close(); eventSource = null; }
    hideThinking();
    await fetch(`/api/sessions/${deleting}`, { method: 'DELETE' });
    currentSession = null;
    document.getElementById('messages').innerHTML = '<div class="msg status">Select or create a session to start chatting.</div>';
    updateChatAvailability();
    await refreshSessions();
    await refreshPanelData();
  }

  function escHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function truncText(value, max) {
    const s = String(value ?? '');
    return s.length > max ? s.slice(0, Math.max(0, max - 1)) + '…' : s;
  }

  function renderToolCall(name, input) {
    const safeName = escHtml(name || 'tool');
    const badgeHtml = label => `<span class="tool-badge">${escHtml(label)}</span>`;
    const card = (summary, extra = '', meta = '') => `
      <div class="tool-card">
        <div class="tool-head">
          <div class="tool-main">
            <span class="tool-name">${safeName}</span>
            ${summary ? `<span class="tool-summary">${summary}</span>` : ''}
          </div>
          ${meta ? `<div class="tool-meta">${meta}</div>` : ''}
        </div>
        ${extra}
      </div>`;

    if (name === 'bash') {
      const cmd = String(input.command || '');
      const badges = [];
      if (input.timeout) badges.push(`${Math.floor(Number(input.timeout) / 1000)}s`);
      if (input.pty) badges.push('pty');
      const lines = cmd.split('\n');
      const isLong = lines.length > 5 || cmd.length > 300;
      const collapsedCmd = isLong ? lines.slice(0, 3).join('\n') : cmd;
      const codeId = `tool-code-${Math.random().toString(36).slice(2, 10)}`;
      const extra = `
        <pre class="tool-command"><code id="${codeId}" data-full="${escHtml(cmd)}" data-collapsed="${escHtml(collapsedCmd)}">${escHtml(collapsedCmd)}</code></pre>
        ${isLong ? `<button class="tool-more" onclick="(function(btn, code){ const expanded = btn.dataset.expanded === '1'; code.innerHTML = expanded ? code.dataset.collapsed : code.dataset.full; btn.dataset.expanded = expanded ? '0' : '1'; btn.textContent = expanded ? '▼ show more' : '▲ show less'; })(this, document.getElementById('${codeId}'))">▼ show more</button>` : ''}`;
      return card('', extra, badges.map(badgeHtml).join(''));
    }

    if (name === 'web_search') return card(`🔍 <span class="quote">&quot;${escHtml(input.query || '')}&quot;</span>`);
    if (name === 'send_to_session') return card(`→ <span class="mono">${escHtml(input.session_id || 'unknown')}</span> ${escHtml(truncText(input.message || '', 80))}`);
    if (name === 'fetch_url') return card(`🌐 <span class="mono">${escHtml(truncText(input.url || '', 120))}</span>`);
    if (name === 'propose_entity_update') {
      const target = input.file_path || input.layer || 'target';
      const reason = truncText(input.reason || '', 60);
      return card(`<span class="mono">${escHtml(target)}</span>${reason ? ` — ${escHtml(reason)}` : ''}`);
    }

    const entries = Object.entries(input || {})
      .filter(([, value]) => value !== undefined && value !== null && value !== '')
      .slice(0, 2)
      .map(([key, value]) => `${escHtml(key)}=${escHtml(truncText(typeof value === 'string' ? value : JSON.stringify(value), 40))}`);
    return card(entries.join(' · ') || '(no args)');
  }

  init();
</script>
</body>
</html>
